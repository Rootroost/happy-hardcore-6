<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Hardcore 6 - Mikhas Birthday Edition</title>
    <style>
        :root {
            --color-1: rgb(57, 166, 189); 
            --color-2: rgb(0, 50, 100);   
            --accent-color: var(--color-1);
            --text-main: #ffffff;
            --text-dim: #f0f0f0;
            --card-bg: rgba(0, 0, 0, 0.45); 
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
            background: linear-gradient(-45deg, var(--color-1), var(--color-2), var(--color-1));
            background-size: 200% 200%;
            animation: gradientBG 18s ease-in-out infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { max-width: 500px; width: 100%; margin-top: 20px; padding-bottom: 50px; }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; 
            margin-bottom: 30px;
        }

        .text-block { text-align: left; }

        .cover-art { 
            width: 100%; aspect-ratio: 1/1; border-radius: 12px; 
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6); 
            object-fit: cover; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.2); 
            display: block;
        }

        h1 { font-size: 28px; margin: 0 0 5px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        /* ВОТ ТУТ ТВОЯ ТЕНЬ ВЕРНУЛАСЬ В ПОЛНОМ ОБЪЕМЕ */
        .subtitle { 
            color: #ffffff; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 14px; 
            letter-spacing: 1.5px; 
            margin-bottom: 3px; 
        }

        .small-desc { 
            color: var(--text-dim); 
            font-size: 11px; 
            margin: 0 0 8px 0; 
            letter-spacing: 0.5px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .info-link {
            color: rgba(255, 255, 255, 0.8);
            font-size: 11px;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .info-link:hover { color: var(--color-1); }

        .player-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }

        .nav-btn, .master-play-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .nav-btn { width: 40px; height: 40px; }
        .master-play-btn { width: 54px; height: 54px; border: 2px solid rgba(255,255,255,0.4); background: var(--card-bg); }
        .nav-btn svg { fill: white; width: 18px; height: 18px; }
        .master-play-btn svg { fill: white; width: 22px; height: 22px; }

        .playlist { 
            background: var(--card-bg); 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.12); 
            backdrop-filter: blur(12px); 
        }

        .track { 
            padding: 15px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            position: relative; 
            transition: background 0.3s ease;
        }
        .track:last-child { border-bottom: none; }
        
        .track.active-track { background: rgba(255, 255, 255, 0.05); }
        .track.active-track .track-name { font-weight: bold; color: #ffffff; }

        .track-info { display: flex; align-items: center; margin-bottom: 8px; }
        .track-number { color: var(--color-1); font-family: monospace; font-size: 14px; margin-right: 12px; font-weight: bold; }
        .track-name { font-size: 14px; font-weight: 500; }

        audio { width: 100%; height: 32px; filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <img src="https://res.cloudinary.com/dny7japw9/image/upload/v1776275862/cover_original_AI_editted_mhcoz1.png" class="cover-art">
    
    <div class="header-section">
        <div class="text-block">
            <h1>Happy Hardcore 6</h1>
            <div class="subtitle">Personal Mikhas Birthday Edition</div>
            <div class="small-desc">the best tracks of 2CD tracklist</div>
            <a href="https://www.discogs.com/ru/release/5703852-Various-Happy-Hardcore-6" target="_blank" class="info-link">original release info at Discogs</a>
        </div>
        
        <div class="player-controls">
            <button class="nav-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="master-play-btn" id="masterPlayBtn">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="nav-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
    </div>

    <div class="playlist" id="playlist">
        <div class="track"><div class="track-info"><span class="track-number">01</span><span class="track-name">Technohead - Happy Birthday</span></div><audio controls preload="none"><source src="https://res.cloudinary.com/dny7japw9/video/upload/v1776285587/01_-_Technohead_-_Happy_Birthday_Timitico_s_Party_Blast_titmo0.flac" type="audio/flac"></audio></div>
        <div class="track"><div class="track-info"><span class="track-number">02</span><span class="track-name">Critical Mass - Believe In The Future</span></div><audio controls preload="none"><source src="https://res.cloudinary.com/dny7japw9/video/upload/v1776275813/01_-_Critical_Mass_-_Believe_in_the_future_Radio_Edit_fvpild.flac" type="audio/flac"></audio></div>
        </div>
</div>

<script>
    const audios = document.querySelectorAll('audio');
    const tracks = document.querySelectorAll('.track');
    const masterPlayBtn = document.getElementById('masterPlayBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    let currentIdx = 0;

    function updateUI() {
        const anyPlaying = Array.from(audios).some(a => !a.paused);
        playIcon.style.display = anyPlaying ? 'none' : 'block';
        pauseIcon.style.display = anyPlaying ? 'block' : 'none';
        
        tracks.forEach((t, i) => {
            if (i === currentIdx && anyPlaying) t.classList.add('active-track');
            else t.classList.remove('active-track');
        });
    }

    audios.forEach((audio, idx) => {
        audio.onplay = () => {
            currentIdx = idx;
            audios.forEach(a => { if(a !== audio) a.pause(); });
            updateUI();
        };
        audio.onpause = updateUI;
        audio.onended = () => {
            if (idx + 1 < audios.length) audios[idx+1].play();
        };
    });

    masterPlayBtn.onclick = () => {
        const active = Array.from(audios).find(a => !a.paused);
        if (active) active.pause(); else audios[currentIdx].play();
    };
    
    document.getElementById('nextBtn').onclick = () => {
        audios[currentIdx].pause();
        currentIdx = (currentIdx + 1) % audios.length;
        audios[currentIdx].play();
    };

    document.getElementById('prevBtn').onclick = () => {
        audios[currentIdx].pause();
        currentIdx = (currentIdx - 1 + audios.length) % audios.length;
        audios[currentIdx].play();
    };
</script>
</body>
</html>
